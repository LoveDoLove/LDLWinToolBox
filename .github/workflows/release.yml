name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build EXE
        run: pyinstaller LDLWinToolBox.spec --noconfirm
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LDLWinToolBox.exe
          path: dist/LDLWinToolBox.exe
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LDLWinToolBox.exe
          generate_release_notes: true
